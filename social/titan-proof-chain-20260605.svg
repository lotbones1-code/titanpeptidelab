<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8faf7"/>
      <stop offset="0.62" stop-color="#edf6f1"/>
      <stop offset="1" stop-color="#dbece4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f1613" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1080" height="1350" fill="url(#bg)"/>
  <circle cx="950" cy="130" r="210" fill="#1e6f58" opacity="0.08"/>
  <circle cx="110" cy="1220" r="240" fill="#1e6f58" opacity="0.10"/>

  <g transform="translate(78 76)">
    <rect x="0" y="0" width="924" height="1198" rx="54" fill="#fffdfa" filter="url(#shadow)"/>
    <rect x="38" y="38" width="848" height="1122" rx="38" fill="none" stroke="#dfe6e2" stroke-width="2"/>

    <text x="68" y="120" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800" letter-spacing="5" fill="#1a5c48">TITAN PEPTIDE LAB</text>
    <text x="68" y="196" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="500" line-height="0.96" fill="#0f1613">Don’t buy</text>
    <text x="68" y="284" font-family="Georgia, 'Times New Roman', serif" font-size="86" font-weight="500" fill="#0f1613">mystery vials.</text>
    <text x="68" y="344" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="600" fill="#1a5c48">Verify the lot before the bottle ships.</text>

    <g transform="translate(68 420)">
      <rect x="0" y="0" width="788" height="132" rx="28" fill="#f0f7f4" stroke="#cfe0d8"/>
      <text x="32" y="50" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f1613">1. Lot number + release sheet</text>
      <text x="32" y="92" font-family="Inter, Arial, sans-serif" font-size="22" fill="#52605a">Batch-specific paperwork, not a recycled document.</text>
    </g>
    <g transform="translate(68 582)">
      <rect x="0" y="0" width="788" height="132" rx="28" fill="#ffffff" stroke="#dfe6e2"/>
      <text x="32" y="50" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f1613">2. HPLC purity target ≥99%</text>
      <text x="32" y="92" font-family="Inter, Arial, sans-serif" font-size="22" fill="#52605a">A method and value tied to the lot on your label.</text>
    </g>
    <g transform="translate(68 744)">
      <rect x="0" y="0" width="788" height="132" rx="28" fill="#ffffff" stroke="#dfe6e2"/>
      <text x="32" y="50" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f1613">3. 24h dispatch target</text>
      <text x="32" y="92" font-family="Inter, Arial, sans-serif" font-size="22" fill="#52605a">Crypto checkout. Worldwide tracked shipping.</text>
    </g>

    <rect x="68" y="946" width="788" height="120" rx="30" fill="#0f1613"/>
    <text x="104" y="997" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">Research use only</text>
    <text x="104" y="1038" font-family="Inter, Arial, sans-serif" font-size="21" fill="#c8d4ce">Not for human or animal consumption.</text>

    <text x="68" y="1120" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800" fill="#1a5c48">titanpeptidelab.com/start</text>
  </g>
